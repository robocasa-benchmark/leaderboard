# Posts an auto-generated PR comment from the submission JSON so contributors
# do not duplicate fields in the PR description.
#
# Checkout uses the base branch (main) so workflow scripts are always present.
# Submission JSON is read from the PR head via refs/pull/<n>/head.

name: PR submission summary

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to summarize (for manual re-runs)"
        required: true
        type: number

permissions:
  pull-requests: write
  contents: read

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch PR head
        run: |
          git fetch origin \
            +refs/pull/${{ steps.pr.outputs.number }}/head:refs/remotes/pull/${{ steps.pr.outputs.number }}/head

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Find changed submission JSON files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            if [ -z "$BASE_SHA" ]; then
              BASE_SHA="$(git merge-base origin/main refs/remotes/pull/${{ steps.pr.outputs.number }}/head)"
            fi
          else
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          fi
          mapfile -t FILES < <(
            git diff --name-only --diff-filter=ACM \
              "$BASE_SHA" \
              "refs/remotes/pull/${{ steps.pr.outputs.number }}/head" \
              -- 'submissions/*.json'
          )
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "paths=" >> "$GITHUB_OUTPUT"
          else
            printf -v joined '%s ' "${FILES[@]}"
            echo "paths=${joined%" "}" >> "$GITHUB_OUTPUT"
          fi

      - name: Materialize submission JSON from PR head
        if: steps.changed.outputs.paths != ''
        run: |
          set -euo pipefail
          for f in ${{ steps.changed.outputs.paths }}; do
            mkdir -p "$(dirname "$f")"
            git show "refs/remotes/pull/${{ steps.pr.outputs.number }}/head:${f}" > "${f}"
          done

      - name: Render comment body
        run: |
          set -euo pipefail
          cd scripts
          if [ -z "${{ steps.changed.outputs.paths }}" ]; then
            python render_pr_comment.py > ../comment-body.md
          else
            python render_pr_comment.py \
              $(printf '../%s ' ${{ steps.changed.outputs.paths }}) > ../comment-body.md
          fi

      - name: Post or update PR comment
        if: github.event_name == 'workflow_dispatch' || github.event.pull_request.state == 'open'
        continue-on-error: true
        id: comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ steps.pr.outputs.number }}
          body-path: comment-body.md
          edit-mode: replace
          comment-tag: robocasa-submission-summary

      - name: Finish (closed PR or comment skipped)
        if: steps.comment.outcome == 'skipped' || steps.comment.outcome == 'failure'
        run: |
          echo "PR comment was not posted (merged/closed PR or post failed). Summary rendered successfully."
          cat comment-body.md
